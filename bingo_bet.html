<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>橡子森林 — BINGO BINGO 投注機</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@500;700;900&display=swap');
  :root { --bg-sky: #e0f2fe; --wood-dark: #6d4c41; --wood-light: #fbf4e9; --acorn-gold: #ffca28; }
  body { background: var(--bg-sky); font-family: 'Noto Sans TC', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
  .app-container { background-color: var(--wood-light); width: 1000px; border-radius: 20px; display: flex; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.3); border: 4px solid var(--wood-dark); }
  .left-panel { flex: 7; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
  
  /* 歷史紀錄區塊樣式 */
  #bingo-history-container { background: white; padding: 15px; border-radius: 8px; border: 2px solid var(--wood-dark); margin-bottom: 20px; }
  .history-item { padding: 8px; border-bottom: 1px solid #eee; font-size: 14px; }
</style>
</head>
<body>

<div class="app-container">
    <div class="left-panel">
        <h1>BINGO BINGO 投注機</h1>
        
        <div id="bingo-history-container">
            <h3>近期開獎紀錄</h3>
            <div id="history-list">讀取中...</div>
        </div>

        <div class="betting-area">
            </div>
    </div>
</div>

<script>
  // 載入歷史紀錄的函式
  async function loadHistory() {
      try {
          const res = await fetch('http://127.0.0.1:8000/api/v1/bingo/history?limit=4');
          const json = await res.json();
          const list = document.getElementById('history-list');
          
          if (json.status === "success" && json.data.records) {
              list.innerHTML = json.data.records.map(b => `
                  <div class="history-item">
                      <strong>第 ${b.draw_term} 期</strong> | ${b.numbers.join(', ')}
                  </div>
              `).join('');
          } else {
              list.innerHTML = '暫無紀錄';
          }
      } catch (err) {
          console.error("載入失敗:", err);
          document.getElementById('history-list').innerHTML = '無法連接伺服器';
      }
  }

  // 頁面載入完成後執行
  window.addEventListener('DOMContentLoaded', loadHistory);
</script>

</body>
</html>
