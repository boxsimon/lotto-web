<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>橡子森林 — BINGO BINGO 即時看板</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Noto+Sans+TC:wght@500;700;900&display=swap');
  :root { --bg-sky: #e0f2fe; --berry-red: #e53935; --wood-dark: #6d4c41; --wood-light: #fbf4e9; }
  body { background: var(--bg-sky); font-family: 'Noto Sans TC', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; min-height: 100vh; }
  
  /* 放大的返回按鈕 */
  .back-btn { display: inline-block; margin-bottom: 30px; padding: 15px 40px; background: white; border: 4px solid var(--wood-dark); border-radius: 50px; font-weight: 900; font-size: 20px; color: var(--wood-dark); text-decoration: none; box-shadow: 0 6px 0px var(--wood-dark); transition: 0.2s; }
  .back-btn:active { transform: translateY(4px); box-shadow: 0 2px 0px var(--wood-dark); }
  
  .container { max-width: 960px; width: 100%; }
  
  /* 縮小的開獎時間與手動整理區 */
  .timer-container { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 25px; }
  .countdown { background: white; padding: 10px 20px; border-radius: 12px; font-size: 16px; font-weight: 700; color: var(--berry-red); border: 2px solid var(--berry-red); }
  .refresh-btn { padding: 10px 20px; background: var(--wood-dark); color: white; border-radius: 12px; font-weight: 700; cursor: pointer; border: none; }

  /* 田字布局容器 */
  #bingoDisplay { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  .bingo-card { background: var(--wood-light); border: 4px solid var(--wood-dark); border-radius: 28px; padding: 24px; box-shadow: 0 12px 28px rgba(109, 76, 65, 0.15); }
  .ball { width: 50px; height: 50px; border-radius: 50%; background: radial-gradient(circle at 35% 30%, #fffde7, #ffca28 60%, #ffa000); display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 20px; color: var(--wood-dark); box-shadow: 0 6px 12px rgba(109, 76, 65, 0.3); }
  .numbers-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-top: 20px; }
</style>
</head>
<body>

<a href="./index.html" class="back-btn">⬅️ 返回幸運搖號機</a>

<div class="container">
  <div class="timer-container">
    <div class="countdown">⏱️ 下期開獎倒數：<span id="timerDisplay">00:00</span></div>
    <button class="refresh-btn" onclick="checkApiHealth()">🔄 手動整理</button>
  </div>
  <div id="bingoDisplay">正在載入數據...</div>
</div>

<script>
  // 1. 倒數計時
  function startTimer() {
    setInterval(() => {
      const now = new Date();
      const timeLeft = (5 - (now.getMinutes() % 5)) * 60 - now.getSeconds() + 3;
      const m = Math.floor(timeLeft / 60);
      const s = timeLeft % 60;
      document.getElementById('timerDisplay').textContent = 
        `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
      if (m === 0 && s === 0) checkApiHealth();
    }, 1000);
  }

  // 2. 資料獲取與渲染
// 修改後的 checkApiHealth 函式
// 請直接用這段完整的函式取代原本的 checkApiHealth
async function checkApiHealth() {
    const bingoDisplay = document.getElementById('bingoDisplay');
    const apiUrl = `http://127.0.0.1:8000/api/v1/bingo/history?limit=4&_t=${Date.now()}`;
    
    try {
        const res = await fetch(apiUrl);
        const json = await res.json(); 
        
        // 這裡抓取後端回傳的紀錄陣列
        const records = json.data && json.data.records ? json.data.records : [];
        
        if (records.length > 0) {
            bingoDisplay.innerHTML = records.map((b, idx) => `
                <div class="bingo-card" style="background: white; border-radius: 12px; padding: 15px; margin-bottom: 10px; border-left: 8px solid ${idx === 0 ? '#e53935' : '#ccc'}; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                        <span style="font-size: 1.2rem; font-weight: 900; color: #333;">第 ${b.draw_term} 期</span>
                        <span style="font-size: 0.9rem; color: #888;">${b.draw_date || ''}</span>
                    </div>
                    
                    <div class="numbers-grid" style="display: grid; grid-template-columns: repeat(10, 1fr); gap: 5px;">
                        ${b.numbers.map(n => `
                            <span style="background: #fff9c4; border: 1px solid #ffd54f; border-radius: 50%; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.9rem;">
                                ${String(n).padStart(2, '0')}
                            </span>
                        `).join('')}
                    </div>
                    
                    <div style="margin-top: 10px; font-size: 0.85rem; color: #555; border-top: 1px solid #eee; padding-top: 5px;">
                        大小：${b.super_size || '-'} | ${b.multiplier || '-'}
                    </div>
                </div>
            `).join('');
        } else {
            bingoDisplay.innerHTML = '<div class="bingo-card">目前暫無開獎紀錄，請稍候...</div>';
        }
    } catch (err) {
        console.error("讀取失敗:", err);
    }
}

  // 3. 每三分鐘自動更新 (180,000 毫秒)
  setInterval(checkApiHealth, 180000);

  window.onload = () => { startTimer(); checkApiHealth(); };
</script>
</body>
</html>
