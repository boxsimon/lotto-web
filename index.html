<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>橡子森林 — 幸運搖號機</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Noto+Sans+TC:wght=500;700;900&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    /* 吉卜力森林系遊戲配色 */
    --bg-sky:      #e0f2fe; /* 晴空藍 */
    --forest-dark: #2d5a27; /* 茂密森林綠 */
    --forest-leaf: #4c9e45; /* 嫩葉綠 */
    --wood-light:  #fbf4e9; /* 溫馨牛皮紙白 */
    --wood-dark:   #6d4c41; /* 橡木棕 */
    --acorn-gold:  #ffb300; /* 橡子金黃 */
    --totoro-grey: #78909c; /* 龍貓毛色灰 */
    --berry-red:   #e53935; /* 森林覆盆莓紅 */
    
    --card-shadow: 0 12px 28px rgba(109, 76, 65, 0.15), 0 4px 8px rgba(0,0,0,0.05);
    --ball-shadow: 0 6px 12px rgba(109, 76, 65, 0.3);
  }

  body {
    background: var(--bg-sky);
    color: var(--wood-dark);
    font-family: 'Noto Sans TC', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 60px;
    background-image: 
      linear-gradient(to bottom, #bae6fd 0%, #e0f2fe 40%, #f0fdf4 70%, #dcfce7 100%);
    position: relative;
    overflow-x: hidden;
  }

  /* 仿手繪小草裝飾 */
  body::after {
    content: "🌱 🌿 🍄 🌱";
    position: fixed;
    bottom: 10px;
    font-size: 24px;
    opacity: 0.7;
    letter-spacing: 20px;
    pointer-events: none;
  }

  /* ── Header ── */
  header {
    text-align: center;
    margin-bottom: 24px;
    position: relative;
    z-index: 2;
  }
  .badge {
    display: inline-block;
    background: var(--forest-leaf);
    color: white;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 6px 16px;
    border-radius: 50px;
    margin-bottom: 12px;
    box-shadow: 0 4px 10px rgba(76, 158, 69, 0.2);
  }
  h1 {
    font-size: clamp(32px, 6vw, 42px);
    font-weight: 900;
    color: var(--forest-dark);
    text-shadow: 2px 2px 0px var(--wood-light), 4px 4px 0px rgba(0,0,0,0.05);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .subtitle {
    color: #5d7068;
    font-size: 14px;
    font-weight: 700;
    background: rgba(255,255,255,0.4);
    padding: 4px 12px;
    border-radius: 20px;
    display: inline-block;
  }

  /* ── Mode Tabs (寬度同步放大至 960px) ── */
  .tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
    background-color: rgba(255, 255, 255, 0.6);
    padding: 8px;
    border-radius: 40px;
    border: 3px solid var(--wood-dark);
    width: 100%;
    max-width: 960px; /* 從 680px 擴展至 960px */
    box-shadow: 0 6px 0px var(--wood-dark);
  }
  .tab-btn {
    flex: 1;
    padding: 14px 8px;
    border: none;
    background: transparent;
    color: #8d6e63;
    font-weight: 900;
    font-size: 16px;
    cursor: pointer;
    border-radius: 30px;
    transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    white-space: nowrap;
  }
  .tab-btn.active {
    background: var(--forest-leaf);
    color: white;
    transform: scale(1.02);
    border: 2px solid var(--forest-dark);
    box-shadow: 0 4px 12px rgba(76,158,69,0.3);
  }

  /* ── Ticket card (主卡片同步擴展至 960px) ── */
  .ticket {
    background: var(--wood-light);
    border: 4px solid var(--wood-dark);
    border-radius: 28px;
    padding: 32px;
    width: 100%;
    max-width: 960px; /* 從 680px 擴展至 960px */
    box-shadow: 0 16px 0px rgba(109,76,65,0.2), var(--card-shadow);
    position: relative;
  }

  /* ── 控制面板 ── */
  .control-panel {
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(109, 76, 65, 0.04);
    padding: 14px 20px;
    border-radius: 18px;
    margin-bottom: 24px;
    border: 2px dashed rgba(109, 76, 65, 0.2);
  }
  .control-panel label {
    font-size: 16px;
    color: var(--wood-dark);
    font-weight: 700;
  }
  .control-panel select {
    background: white;
    color: var(--forest-dark);
    border: 2px solid var(--wood-dark);
    padding: 6px 16px;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    outline: none;
    box-shadow: 0 3px 0px var(--wood-dark);
  }

  .section-label {
    font-size: 14px;
    font-weight: 900;
    color: #8d6e63;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    text-transform: uppercase;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 2px;
    background: rgba(109, 76, 65, 0.15);
  }

  /* ── 號碼球容器 ── */
  .groups-container {
    display: flex;
    flex-direction: column;
    gap: 18px;
    margin-bottom: 28px;
    max-height: 400px;
    overflow-y: auto;
    padding-right: 4px;
  }

  .group-row {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    background: white;
    padding: 16px 20px;
    border-radius: 20px;
    border: 2px solid rgba(109, 76, 65, 0.12);
    box-shadow: 0 4px 0px rgba(109, 76, 65, 0.05);
  }

  .group-tag {
    font-size: 14px;
    font-weight: 900;
    color: white;
    background: var(--totoro-grey);
    padding: 6px 14px;
    border-radius: 10px;
    min-width: 75px;
    text-align: center;
  }

  /* ── 號碼球大小微調 ── */
  .ball {
    width: 46px;
    height: 46px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Fredoka One', 'Noto Sans TC', sans-serif;
    font-size: 19px;
    font-weight: 700;
    flex-shrink: 0;
    position: relative;
    border: 2px solid var(--wood-dark);
  }

  .ball.gold {
    background: radial-gradient(circle at 35% 30%, #fffde7, #ffca28 60%, #ffa000);
    color: var(--wood-dark);
    box-shadow: var(--ball-shadow);
  }
  .ball.red {
    background: radial-gradient(circle at 35% 30%, #ffeff0, #ef5350 60%, #b71c1c);
    color: white;
    box-shadow: var(--ball-shadow);
  }
  .ball.empty {
    background: rgba(109, 76, 65, 0.03);
    border: 2px dashed rgba(109, 76, 65, 0.25);
    color: rgba(109, 76, 65, 0.3);
  }
  
  .ball.popping {
    animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  @keyframes pop {
    0%   { transform: scale(0) rotate(-20deg); opacity: 0; }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }

  .divider {
    width: 3px;
    height: 28px;
    background: rgba(109, 76, 65, 0.2);
    border-radius: 2px;
    margin: 0 4px;
  }

  /* ── 號碼分佈格子 (更改為每行 10 個球，更寬敞整齊) ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(10, 1fr); /* 從原本的 7 改為 10 */
    gap: 10px;
    margin-bottom: 32px;
    padding: 0 10px;
  }
  .grid-num {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Fredoka One', sans-serif;
    font-size: 14px;
    font-weight: 700;
    background: white;
    color: #bcaaa4;
    border: 2px solid rgba(109, 76, 65, 0.1);
    margin: 0 auto;
    transition: all 0.2s;
  }
  .grid-num.picked-gold {
    background: var(--acorn-gold);
    color: var(--wood-dark);
    border-color: var(--wood-dark);
    transform: scale(1.1);
    box-shadow: 0 4px 8px rgba(255,179,0,0.3);
  }
  .grid-num.picked-red {
    background: var(--berry-red);
    color: white;
    border-color: var(--wood-dark);
    transform: scale(1.1);
    box-shadow: 0 4px 8px rgba(229,57,53,0.3);
  }

  /* ── 動作按鈕 ── */
  .actions { display: flex; gap: 14px; }
  .btn-primary {
    flex: 1;
    padding: 16px 24px;
    background: linear-gradient(to bottom, #81c784, #4caf50);
    color: white;
    font-weight: 900;
    font-size: 18px;
    border: 3px solid var(--forest-dark);
    border-radius: 16px;
    cursor: pointer;
    letter-spacing: 1px;
    box-shadow: 0 6px 0px var(--forest-dark);
    transition: all 0.1s;
  }
  .btn-primary:hover {
    transform: translateY(2px);
    box-shadow: 0 4px 0px var(--forest-dark);
  }
  .btn-primary:active {
    transform: translateY(6px);
    box-shadow: 0 0px 0px var(--forest-dark);
  }
  .btn-primary:disabled {
    background: #cfd8dc;
    border-color: #90a4ae;
    color: #78909c;
    box-shadow: 0 4px 0px #90a4ae;
    cursor: not-allowed;
    transform: none !important;
  }
  .btn-secondary {
    padding: 16px 26px;
    background: #e0e0e0;
    color: var(--wood-dark);
    font-weight: 700;
    font-size: 15px;
    border: 3px solid #9e9e9e;
    border-radius: 16px;
    box-shadow: 0 4px 0px #9e9e9e;
    cursor: pointer;
  }
  .btn-secondary:active {
    transform: translateY(4px);
    box-shadow: 0 0px 0px #9e9e9e;
  }
</style>
</head>
<body>

<header>
  <div class="badge">🍃 森林廣播 API 連線版</div>
  <h1 id="mainTitle">🌰 大樂透幸運選號</h1>
  <p class="subtitle" id="subTitle"></p>
</header>

<div class="tabs">
  <button class="tab-btn active" id="tab-superlotto" onclick="switchMode('superlotto')">🪵 大樂透</button>
  <button class="tab-btn" id="tab-539" onclick="switchMode('539')">🐾 今彩 539</button>
  <button class="tab-btn" id="tab-powerlotto" onclick="switchMode('powerlotto')">✨ 威力彩</button>
</div>

<div class="ticket">
  <div class="control-panel" id="controlPanel">
    <label for="countSelect">🪵 挑選你要的注數：</label>
    <select id="countSelect" onchange="reset()">
      <option value="1" selected>1 注</option>
      <option value="2">2 注</option>
      <option value="3">3 注</option>
	  <option value="4">4 注</option>
      <option value="5">5 注</option>
      <option value="10">10 注</option>
    </select>
  </div>

  <div class="section-label" id="panelLabel">🌰 搖出的橡子果實</div>
  
  <div class="groups-container" id="groupsContainer"></div>

  <div class="section-label" id="gridLabel">🍄 號碼落葉盤</div>
  <div class="grid" id="numGrid"></div>

  <div class="actions">
    <button class="btn-primary" id="drawBtn" onclick="draw()">✨ 召喚幸運號碼</button>
    <button class="btn-secondary" onclick="reset()">歸零</button>
  </div>
</div>

<script>
  // 核心模式配置：設定專屬 Render API 連線
  const modeConfigs = {
    superlotto: {
      title: '🌰 大樂透幸運選號',
      subtitle: '',
      gridTotal: 49,
      mainPick: 6,
      hasSpecial: true,
      maxSpecialNum: 49,
      apiTemplate: (count) => `https://ai-lotto-api.onrender.com/api/v1/lottery/superlotto?count=${count}`
    },
    '539': {
      title: '🐾 今彩 539 森林選號',
      subtitle: '',
      gridTotal: 39,
      mainPick: 5,
      hasSpecial: false,
      maxSpecialNum: 0,
      apiTemplate: (count) => `https://ai-lotto-api.onrender.com/api/v1/lottery/539/super?count=${count}`
    },
    powerlotto: {
      title: '✨ 威力彩雷霆選號',
      subtitle: '',
      gridTotal: 38,       // 第一區 01 ~ 38
      mainPick: 6,         // 第一區選 6 個
      hasSpecial: true,    // 有第二區特別號
      maxSpecialNum: 8,    // 第二區 01 ~ 08
      apiTemplate: (count) => `https://ai-lotto-api.onrender.com/api/v1/lottery/powerlotto/super?count=${count}`
    }
  };

  let currentMode = 'superlotto';

  function buildGrid() {
    const grid = document.getElementById('numGrid');
    grid.innerHTML = '';
    const config = modeConfigs[currentMode];
    
    document.getElementById('gridLabel').textContent = `🍄 第一區號碼盤 (01 – ${config.gridTotal})`;

    for (let i = 1; i <= config.gridTotal; i++) {
      const el = document.createElement('div');
      el.className = 'grid-num';
      el.id = 'g' + i;
      el.textContent = String(i).padStart(2, '0');
      grid.appendChild(el);
    }
  }

  function switchMode(mode) {
    if (currentMode === mode) return;
    currentMode = mode;
    
    document.getElementById('tab-superlotto').className = mode === 'superlotto' ? 'tab-btn active' : 'tab-btn';
    document.getElementById('tab-539').className = mode === '539' ? 'tab-btn active' : 'tab-btn';
    document.getElementById('tab-powerlotto').className = mode === 'powerlotto' ? 'tab-btn active' : 'tab-btn';
    
    const config = modeConfigs[mode];
    document.getElementById('mainTitle').textContent = config.title;
    document.getElementById('subTitle').textContent = config.subtitle;
    
    reset();
  }

  function initEmptyRows() {
    const container = document.getElementById('groupsContainer');
    container.innerHTML = '';
    
    const count = parseInt(document.getElementById('countSelect').value);
    const config = modeConfigs[currentMode];

    for(let g = 0; g < count; g++) {
      const row = document.createElement('div');
      row.className = 'group-row';
      row.innerHTML = `<div class="group-tag">第 ${g+1} 注</div>`;
      
      for(let i = 0; i < config.mainPick; i++) {
        row.innerHTML += `<div class="ball empty">?</div>`;
      }
      
      if (config.hasSpecial) {
        row.innerHTML += `<div class="divider"></div><div class="ball empty">?</div>`;
      }
      
      container.appendChild(row);
    }
  }

  function getMockData(mode, count) {
    const config = modeConfigs[mode];
    const genGroup = () => {
      let pool = Array.from({length: config.gridTotal}, (_, i) => i + 1).sort(() => Math.random() - 0.5);
      let main = pool.slice(0, config.mainPick).sort((a,b) => a - b);
      let special = config.hasSpecial ? Math.floor(Math.random() * config.maxSpecialNum) + 1 : null;
      return { numbers: main, special: special };
    };
    let groups = [];
    for(let i = 0; i < count; i++) groups.push(genGroup());
    return { data: { groups: groups } };
  }

  async function draw() {
    const btn = document.getElementById('drawBtn');
    btn.disabled = true;
    clearGrid();

    const container = document.getElementById('groupsContainer');
    const userCount = parseInt(document.getElementById('countSelect').value);
    const config = modeConfigs[currentMode];

    const apiUrl = config.apiTemplate(userCount);
    let groupsData = [];

    try {
      const response = await fetch(apiUrl);
      if (!response.ok) throw new Error('API 回應錯誤');
      const resJson = await response.json();
      groupsData = resJson.data.groups; 
    } catch (error) {
      console.warn('⚠️ 呼叫 API 失敗，啟用前端 Mock 模擬。', error);
      const mock = getMockData(currentMode, userCount);
      groupsData = mock.data.groups;
    }

    initEmptyRows();

    for (let gIdx = 0; gIdx < groupsData.length; gIdx++) {
      const rowElement = container.children[gIdx];
      const ballElements = rowElement.querySelectorAll('.ball'); 
      
      const mainNums = groupsData[gIdx].numbers;
      const specNum = groupsData[gIdx].special; 
      const allNums = specNum !== undefined && specNum !== null ? [...mainNums, specNum] : mainNums;

      for (let bIdx = 0; bIdx < allNums.length; bIdx++) {
        await new Promise(r => setTimeout(r, 60)); 
        const ballEl = ballElements[bIdx];
        const finalNum = allNums[bIdx];
        const isSpecial = config.hasSpecial && (bIdx === config.mainPick);

        let spins = 0;
        await new Promise(resolve => {
          const interval = setInterval(() => {
            const maxRoll = isSpecial ? config.maxSpecialNum : config.gridTotal;
            ballEl.textContent = String(Math.floor(Math.random() * maxRoll) + 1).padStart(2, '0');
            spins++;
            
            if (spins >= 5) {
              clearInterval(interval);
              ballEl.textContent = String(finalNum).padStart(2, '0');
              ballEl.className = `ball ${isSpecial ? 'red' : 'gold'} popping`;
              
              if (!isSpecial || currentMode !== 'powerlotto') {
                const gPanel = document.getElementById('g' + finalNum);
                if (gPanel) gPanel.className = `grid-num ${isSpecial ? 'picked-red' : 'picked-gold'}`;
              }
              
              resolve();
            }
          }, 40);
        });
      }
    }

    btn.disabled = false;
  }

  function clearGrid() {
    const config = modeConfigs[currentMode];
    for (let i = 1; i <= config.gridTotal; i++) {
      const g = document.getElementById('g' + i);
      if (g) g.className = 'grid-num';
    }
  }

  function reset() {
    buildGrid();
    initEmptyRows();
  }

  window.onload = function() {
    reset();
  };
</script>

</body>
</html>
